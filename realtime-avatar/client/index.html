<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realtime Avatar Assistant</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
      }
      header {
        padding: 1rem;
        text-align: center;
      }
      #scene {
        width: 70vw;
        height: 70vh;
        border-radius: 12px;
        background: #020617;
      }
      .controls {
        display: flex;
        gap: 1rem;
        margin: 1rem 0;
      }
      button {
        background: #1d4ed8;
        border: none;
        color: white;
        padding: 0.5rem 1.5rem;
        border-radius: 9999px;
        cursor: pointer;
        font-size: 1rem;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #mic-indicator {
        height: 16px;
        width: 16px;
        border-radius: 50%;
        background: #dc2626;
        box-shadow: 0 0 10px rgba(220, 38, 38, 0.6);
      }
      footer {
        margin-top: auto;
        padding: 1rem;
        font-size: 0.85rem;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Realtime Avatar Assistant</h1>
      <p>Fully local, low-latency voice chat with lip-sync.</p>
    </header>
    <div class="controls">
      <button id="connect">Connect</button>
      <button id="disconnect" disabled>Disconnect</button>
      <div id="mic-indicator" title="Microphone status"></div>
    </div>
    <canvas id="scene"></canvas>
    <div id="caption"></div>
    <footer>Audio &amp; visemes are processed locally. Interrupt by speaking anytime.</footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
